<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
  	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
	<title>Smmarket</title>
	<link rel="stylesheet" type="text/css" href="css/font-awesome.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap.css">
	<link rel="stylesheet" type="text/css" href="css/global.css">
	<link rel="stylesheet" type="text/css" href="css/style-front.css">
	<link rel="stylesheet" type="text/css" href="css/myaccount.css">
	<link rel="stylesheet" type="text/css" href="css/select2.min.css">
	<link rel="stylesheet" type="text/css" href="css/flickity.css">
	<style type="text/css">
.add-to-list {
    background: #fff;
    border-radius: .5em;
    padding: 1em;
    display: inline-block;
    width: auto;
}
.add-to-list li {
    list-style: none;
    background: #d1703c;
    border-bottom: 0 solid #fff;
    color: #fff;
    height: 0;
    padding: 0 .5em;
    margin: 0;
    overflow: hidden;
    line-height: 2em;
    width: 10em;
}
.add-to-list li:hover {
    cursor: crosshair;
}
.add-to-list li.show {
    height: 2em;
    border-width: 2px;
}
.add-to-list.fade li {
    -webkit-transition: all .4s ease-out;
    transition: all .4s ease-out;
    opacity: 0;
    height: 2em;
}
.add-to-list.fade li.show {
    opacity: 1;
}
.add-to-list.slide-fade li {
    -webkit-transition: all .4s ease-out;
    transition: all .4s ease-out;
    opacity: 0;
}
.add-to-list.slide-fade li.show {
    opacity: 1;
}
.add-to-list.swing {
    -webkit-perspective: 100px;
    perspective: 100px;
}
.add-to-list.swing li {
    opacity: 0;
    -webkit-transform: rotateX(-90deg);
    transform: rotateX(-90deg);
    -webkit-transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
    transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
}
.add-to-list.swing li.show {
    opacity: 1;
    -webkit-transform: none;
    transform: none;
    -webkit-transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
    transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
}
.add-to-list.swing-side {
    -webkit-perspective: 200px;
    perspective: 200px;
}
.add-to-list.swing-side li {
    -webkit-transform: rotateY(-90deg);
    transform: rotateY(-90deg);
    -webkit-transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
    transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
}
.add-to-list.swing-side li.show {
    opacity: 1;
    -webkit-transform: none;
    transform: none;
    -webkit-transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
    transition: all .5s cubic-bezier(.36, -.64, .34, 1.76);
}
.demo {
    background: #f1cbbc;
}
.post-header-container {
    background: 0 0;
    -webkit-perspective: 800px;
    perspective: 800px;
    position: absolute;
    left: 50%;
    bottom: 0;
    -webkit-transform-style: preserve-3d;
    transform-style: preserve-3d;
    -webkit-transform: translateX(-50%) rotateX(-55deg) rotateY(0deg) skewX(30deg);
    transform: translateX(-50%) rotateX(-55deg) rotateY(0deg) skewX(30deg);
    font-size: 64px;
}
.post-header-container .add-to-list {
    background: 0 0;
}
.post-header-container .add-to-list li {
    border-color: #f1cbbc!important;
    -webkit-transform: translateZ(2em) rotateX(90deg);
    transform: translateZ(2em) rotateX(90deg);
    cursor: default;
    -webkit-transition: all .8s cubic-bezier(.36, -.64, .34, 1);
    transition: all .8s cubic-bezier(.36, -.64, .34, 1);
    opacity: 0;
}
.post-header-container .add-to-list li.show {
    -webkit-transform: none;
    transform: none;
    opacity: 1;
}
.post-header-container .add-to-list li.hide {
    opacity: 0;
    height: 0;
    border-width: 0;
    -webkit-transition: all 1s linear;
    transition: all 1s linear;
    -webkit-transform: rotateX(-50deg);
    transform: rotateX(-50deg);
    -webkit-transition: all .5s ease-out;
    transition: all .5s ease-out;
}
.slide-fade li {
  transition: all 0.4s ease-out;
  opacity: 0;
}
.slide-fade li.show {
  opacity: 1;
}

@media(max-width:550px) {
    .post-header-container {
    font-size: 40px;
}
}@media(max-width:420px) {
    .post-header-container {
    font-size: 24px;
}
}

	</style>	
</head>
<body>

<div class="wrapper">

	
	
	<!-- Content Start -->
	<div class="content-wrap">

	


		<div class="container">			
			<div class="row">
				<div class="col-sm-12">	
									
				<section class="add-to-list slide-fade demo-container">
					<ul>
					<li class="show" style="background-color: #d13c9e;">List item</li>
					<li class="show" style="background-color: #3cd19e;">List item</li>
					<li class="show" style="background-color: rgb(60, 109, 209);">List item</li><li class="show" style="background-color: rgb(60, 109, 209);">List item</li></ul>
					<button style="margin-top: 15px">Add a list item</button>
					</section>


						

						
				</div>
			</div>	
		</div>				
	</div>





	
	


</div>

<script src="js/jquery.min.js"></script>  
<script src="js/bootstrap.bundle.js"></script>
<script src="js/bootstrap.min.js"></script> 
<script src="js/select2.min.js"></script>	
<script src="js/sgCustom.js"></script>
<script src="https://cssanimation.rocks/javascript/custom/list_items.js"></script>


<script type="text/javascript">
	document.getElementById('add-to-list').onclick = function() {
	  var list = document.getElementById('list');
	  var newLI = document.createElement('li');
	  newLI.innerHTML = 'A new item';
	  list.appendChild(newLI);
	  setTimeout(function() {
	    newLI.className = newLI.className + " show";
	  }, 10);
	}
</script>

</body>
</html>
